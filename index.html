let curCountry=null,curStyle=null;

function selectCountry(c,btn){
  curCountry=c;curStyle=null;
  document.querySelectorAll('.country-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const sel=document.getElementById('style-select');
  sel.innerHTML='<option value="">— اختر الطراز —</option>';
  DB[c].forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id;o.textContent=s.id+'. '+s.title;
    sel.appendChild(o);
  });
  document.getElementById('style-section').style.display='block';
  document.getElementById('vars-section').style.display='none';
  document.getElementById('preview-section').style.display='none';
  document.getElementById('copy-btn').disabled=true;
}

function selectStyle(){
  const sel=document.getElementById('style-select');
  const id=parseInt(sel.value);
  if(!id){
    document.getElementById('vars-section').style.display='none';
    document.getElementById('preview-section').style.display='none';
    document.getElementById('copy-btn').disabled=true;
    return;
  }
  curStyle=DB[curCountry].find(s=>s.id===id);
  buildVars();
  document.getElementById('vars-section').style.display='block';
  document.getElementById('preview-section').style.display='block';
  document.getElementById('copy-btn').disabled=false;
  updatePreview();
}

function buildVars(){
  const s=curStyle;
  const vg=document.getElementById('vars-grid');
  const og=document.getElementById('opts-grid');
  vg.innerHTML='';og.innerHTML='';
  s.vars.forEach(v=>{
    const d=document.createElement('div');d.className='var-item';
    d.innerHTML=`<span class="var-label">[${v.k}]</span><input class="var-input" id="vr-${v.k}" value="${v.v}" oninput="updatePreview()" />`;
    vg.appendChild(d);
  });
  Object.entries(s.opts).forEach(([k,vals])=>{
    const d=document.createElement('div');d.className='opt-item';
    d.innerHTML=`<span class="opt-label">[${k}]</span><select class="opt-select" id="op-${k}" onchange="updatePreview()">${vals.map((v,i)=>`<option value="${v}"${i===0?' selected':''}>${v}</option>`).join('')}</select>`;
    og.appendChild(d);
  });
}

function buildPrompt(){
  const s=curStyle;
  let txt=s.prompt;
  s.vars.forEach(v=>{
    const el=document.getElementById(`vr-${v.k}`);
    const val=el?el.value:v.v;
    txt=txt.replace(new RegExp(`\\[${v.k}\\]`,'g'),val||v.v);
  });
  Object.keys(s.opts).forEach(k=>{
    const el=document.getElementById(`op-${k}`);
    if(el) txt=txt.replace(new RegExp(`\\[${k}\\]`,'g'),el.value);
  });
  txt+='\n\n'+s.neg;
  return txt;
}

function updatePreview(){
  if(!curStyle)return;
  document.getElementById('preview-text').textContent=buildPrompt();
}

function doCopy(){
  if(!curStyle)return;
  const txt=buildPrompt();
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  });
  const btn=document.getElementById('copy-btn');
  btn.textContent='تم النسخ!';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='نسخ البرومبت';btn.classList.remove('done');},2000);
}
</script>
